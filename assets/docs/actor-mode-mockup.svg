<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">StoryVista Actor Mode mockup</title><desc id="desc">Actor preparation screen with character list, scene objective, emotional arc, subtext and playable actions.</desc>
  <rect width="1280" height="720" fill="#0e0f10"/><text x="54" y="72" fill="#c6a967" font-family="Arial" font-size="11" letter-spacing="3">ACTOR MODE / EVIDENCE-AWARE</text><text x="54" y="120" fill="#e2dfd8" font-family="Georgia" font-size="38">角色准备不是人物简介</text><text x="54" y="154" fill="#96999d" font-family="Arial" font-size="14">把场景目标、潜台词与可表演动作分开，并保留推断状态。</text>
  <g transform="translate(54 198)" font-family="Arial" font-size="14"><rect width="220" height="462" fill="#111213" stroke="#34373a"/><rect x="12" y="16" width="196" height="58" fill="#202225" stroke="#74694f"/><text x="28" y="42" fill="#e2dfd8">沈砚</text><text x="28" y="62" fill="#96999d" font-size="11">年轻将领</text><text x="28" y="112" fill="#96999d">顾惟忠</text><text x="28" y="162" fill="#96999d">钱弘俶</text><text x="28" y="212" fill="#96999d">韩烛</text><text x="28" y="262" fill="#96999d">何承训</text></g>
  <g transform="translate(292 198)"><rect width="934" height="462" fill="#17191b" stroke="#34373a"/><text x="32" y="38" fill="#c6a967" font-family="Arial" font-size="10" letter-spacing="3">ACTOR FILE / 001</text><text x="32" y="86" fill="#c6a967" font-family="Georgia" font-size="34">沈砚</text><text x="32" y="116" fill="#a8a9a6" font-family="Arial" font-size="14">年轻将领，隶属禁军。所有判断需回看来源证据。</text>
    <g transform="translate(32 154)" font-family="Arial"><path d="M0 0h870M0 120h870M435 0v240" stroke="#34373a"/><text x="0" y="24" fill="#c6a967" font-size="10" letter-spacing="2">SCENE OBJECTIVE</text><text x="0" y="54" fill="#b8b8b4" font-size="15">在忠诚与真相之间作出可见选择</text><text x="458" y="24" fill="#c6a967" font-size="10" letter-spacing="2">EMOTIONAL ARC</text><text x="458" y="54" fill="#b8b8b4" font-size="15">从服从走向承担</text><text x="0" y="148" fill="#c6a967" font-size="10" letter-spacing="2">SUBTEXT</text><text x="0" y="178" fill="#b8b8b4" font-size="15">真正害怕的是忠诚被权臣利用</text><text x="458" y="148" fill="#c6a967" font-size="10" letter-spacing="2">PLAYABLE ACTIONS</text><text x="458" y="178" fill="#b8b8b4" font-size="15">观察 · 逼问 · 护送 · 呈证</text><rect x="0" y="270" width="126" height="28" fill="none" stroke="#435146"/><text x="14" y="289" fill="#9abb9f" font-size="11">查看证据 · inferred</text></g>
  </g>
</svg>
