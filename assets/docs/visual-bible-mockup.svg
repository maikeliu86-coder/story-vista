<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 620" role="img" aria-labelledby="title desc"><title id="title">StoryVista Visual Bible mockup</title><desc id="desc">Visual design specification showing palette, composition, camera language, materials and restrictions.</desc><rect width="1280" height="620" fill="#0e0f10"/><text x="56" y="70" fill="#e2dfd8" font-family="Georgia" font-size="38">Visual Bible</text><text x="56" y="104" fill="#96999d" font-family="Arial" font-size="14">视觉规则来自故事数据，而不是任意套用风格。</text><g transform="translate(56 144)"><rect width="716" height="414" fill="#17191b" stroke="#34373a"/><text x="28" y="42" fill="#c6a967" font-family="Arial" font-size="10" letter-spacing="2">COLOR SYSTEM</text><g transform="translate(28 70)"><rect width="74" height="74" fill="#101112" stroke="#555"/><rect x="88" width="74" height="74" fill="#1b1d1f" stroke="#555"/><rect x="176" width="74" height="74" fill="#d2b36b" stroke="#555"/><rect x="264" width="74" height="74" fill="#d8d6d0" stroke="#555"/><rect x="352" width="74" height="74" fill="#85898f" stroke="#555"/></g><text x="28" y="204" fill="#e2dfd8" font-family="Georgia" font-size="22">Composition &amp; Camera</text><g fill="#96999d" font-family="Arial" font-size="14"><text x="28" y="244">cinematic widescreen</text><text x="28" y="280">archival index</text><text x="28" y="316">measured close-up</text><text x="28" y="352">low-key lighting</text></g></g><g transform="translate(792 144)"><rect width="432" height="414" fill="#17191b" stroke="#34373a"/><text x="28" y="42" fill="#c6a967" font-family="Arial" font-size="10" letter-spacing="2">MATERIALS &amp; RESTRICTIONS</text><g fill="#96999d" font-family="Arial" font-size="14"><text x="28" y="92">weathered paper</text><text x="28" y="128">charcoal</text><text x="28" y="164">brushed brass</text></g><path d="M28 202h376" stroke="#34373a"/><text x="28" y="246" fill="#e2dfd8" font-family="Georgia" font-size="22">Do not use</text><g fill="#b87369" font-family="Arial" font-size="14"><text x="28" y="290">neon cyberpunk</text><text x="28" y="326">glossy game lobby</text><text x="28" y="362">initials-only avatars</text></g></g></g></svg>
