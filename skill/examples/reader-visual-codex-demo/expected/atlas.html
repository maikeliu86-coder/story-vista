 Thirteen Bells", "text": "Doctor Mirabelle Saye Ashcroft waited beside the bridge with ink-stained gloves folded over a blue bottle. Mira lifted the Azure Lumen Tonic into the rain. The cobalt liquid woke with a cold inner glow, and silver bubbles climbed the glass as if they were remembering the stars.", "start_offset": 2639, "end_offset": 2917, "chunk_id": "ch_002"}, {"paragraph_id": "p_0003", "chapter": "Chapter One: Thirteen Bells", "text": "“Meridian Station has been silent for nine years,” Dr. Saye said. “Tonight every clock in Greyford rang thirteen times.”", "start_offset": 2919, "end_offset": 3039, "chunk_id": "ch_003"}, {"paragraph_id": "p_0004", "chapter": "Chapter One: Thirteen Bells", "text": "Captain Aleksandr Ilyich Petrov arrived before Elias could answer. Captain Petrov carried no visible rifle. A black ceramic Resonance Pistol rested at his belt, its twin tuning forks surrounding a narrow chamber where a red energy ring trembled without sound.", "start_offset": 3041, "end_offset": 3300, "chunk_id": "ch_002"}, {"paragraph_id": "p_0005", "chapter": "Chapter One: Thirteen Bells", "text": "Sasha looked from the silver compass in Elias's hand to the Azure Lumen Tonic. “The Ash Observatory is open,” he said. “That should be impossible.”", "start_offset": 3302, "end_offset": 3449, "chunk_id": "ch_003"}, {"paragraph_id": "p_0006", "chapter": "Chapter Two: The Abandoned Platform", "text": "At Meridian Station, brass clocks faced one another across a glass platform. The Glass Meridian appeared for an instant beneath the floor: luminous lines joined the station, Greyford Village, and the Ash Observatory in a map that seemed to remember whoever looked at it.", "start_offset": 3491, "end_offset": 3761, "chunk_id": "ch_004"}, {"paragraph_id": "p_0007", "chapter": "Chapter Two: The Abandoned Platform", "text": "Doctor Ashcroft heard the pressure wave first. Captain Petrov drew the Resonance Pistol. A red circle unfolded through the cold air, revealing a door whe , "characters": "人物", "relationships": "關係網", "locations": "地點", "maps": "地圖", "objects_lore": "物品與設定", "technologies_magic": "科技 / 魔法", "timeline": "時間線", "gallery": "畫廊", "evidence": "證據", "settings": "設定", "reader_panel": "閱讀器"}}}</script>
  <script>
  (()=>{
    const data=JSON.parse(document.getElementById('storyvista-data').textContent);
    const {atlas,manifest,languageProfile,readerText,entityLinking,relationshipWeb,locationAtlas,mapPlan,objectLoreCodex,spoilerState,providerState,themeProfile,visualAssetPlan,allLocales}=data;
    let locale=data.locale, currentLanguage=languageProfile.ui_language;
    const app=document.getElementById('app'), reader=document.getElementById('reader'), content=document.getElementById('content'), nav=document.getElementById('nav');
    const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const t=k=>locale[k]||allLocales.en[k]||k;
    const entities=[...atlas.entities.characters,...atlas.entities.locations,...(atlas.entities.organizations||[]),...(atlas.entities.objects||[]),...(atlas.entities.concepts||[])];
    const byId=Object.fromEntries(entities.map(x=>[x.entity_id,x]));
    const assetsByEntity={}; manifest.assets.forEach(a=>(assetsByEntity[a.bound_to]??=[]).push(a));
    const sections=[['overview','overview'],['characters','characters'],['relationships','relationships'],['locations','locations'],['maps','maps'],['objects-lore','objects_lore'],['technologies-magic','technologies_magic'],['timeline','timeline'],['gallery','gallery'],['evidence','evidence'],['settings','settings']];
    document.documentElement.lang=currentLanguage; document.documentElement.dir=languageProfile.writing_direction;
    themeProfile.palette.forEach((color,index)=>document.documentElement.style.setProperty(['--bg','--text','--accent','--cyan','--red'][index],color));
    function assetFor(id,type){const items=assetsByEntity[id]||[];return items.find(x=>!type||x.asset_id.includes(type))||items[0]||null}
    function imageFor(id,type){return assetFor(id,type)?.file_path||''}
    function statusLabel(status){return ({generated:'Generated',generated_external:'Generated',user_provided:'User provided',pending_external_generation:'External generation pending',prompt_only_ready:'Prompt ready',placeholder:'Placeholder fallback',failed:'Failed',skipped:'Skipped',planned:'Planned'})[status]||status.replaceAll('_',' ')}
    function assetControls(asset){if(!asset)return'';const pending=['pending_external_generation','prompt_only_ready','placeholder'].includes(asset.status);return `<div class="asset-meta"><span class="asset-status ${esc(asset.status)}">${esc(statusLabel(asset.status))}</span>${pending?`<code>${esc(asset.expected_filename)}</code><div class="asset-actions"><button class="prompt-btn" data-copy-asset="${esc(asset.asset_id)}">Copy prompt</button><a class="prompt-link" href="prompt-pack.md" target="_blank">Open prompt pack</a></div><small class="muted">Generate externally, save with this filename, then run bind-images.</small>`:''}</div>`}
    function evidenceButton(item){const ev=item.evidence?.[0];return ev?`<button class="evidence-btn" data-paragraph="${esc(paragraphForChunk(ev.chunk_id))}">${esc(t('jump_to_text'))}</button>`:''}
    function paragraphForChunk(chunk){return readerText.paragraphs.find(p=>p.chunk_id===chunk)?.paragraph_id||readerText.paragraphs[0]?.paragraph_id||''}
    function card(item,kind='portrait'){const asset=assetFor(item.entity_id,kind);return `<article class="card searchable" id="card-${esc(item.entity_id)}" data-entity-id="${esc(item.entity_id)}" data-search="${esc(JSON.stringify(item))}"><img class="art" src="${esc(asset?.file_path||'')}" alt="${esc(item.canonical_name)}"><div class="card-body"><div class="kicker">${esc(item.entity_type)} · ${esc(item.category||item.role_name||item.location_type||'')}</div><h3>${esc(item.canonical_name)}</h3><p>${esc(item.memory_label||item.description||item.faction||item.spatial_notes||'')}</p><div class="tags">${(item.aliases||item.visual_keywords||[]).slice(0,4).map(x=>`<span class="tag">${esc(x)}</span>`).join('')}</div>${assetControls(asset)}<p>${evidenceButton(item)}</p></div></article>`}
    function rowRelation(r){const locked=spoilerState.enabled&&r.spoiler_status==='locked';return `<article class="row searchable ${locked?'locked':''}" data-search="${esc(JSON.stringify(r))}"><div><strong>${esc(byId[r.source_entity_id]?.canonical_name||r.source_name)} → ${esc(byId[r.target_entity_id]?.canonical_name||r.target_name)}</strong><p>${locked?esc(t('locked_until_later')):esc(r.relation_type)}</p></div><div>${locked?'':esc(r.stage)}</div>${locked?'':evidenceButton(r)}</article>`}
    function renderNav(){nav.innerHTML=sections.map((s,i)=>`<button data-section="${s[0]}" class="${i===0?'active':''}">${esc(t(s[1]))}</button>`).join('')}
    function renderContent(){
      const visibleRelations=relationshipWeb.relationships.filter(r=>!(spoilerState.enabled&&r.spoiler_status==='locked'));
      const tech=objectLoreCodex.entries.filter(x=>/tech|magic|weapon|科技|魔法|武器/i.test(`${x.category} ${x.description}`));
      content.innerHTML=`
      <section class="section active" id="overview"><div class="eyebrow">${esc(themeProfile.theme_id)}</div><h1>${esc(atlas.metadata.title)}</h1><p class="lede">${esc(atlas.summary)}</p><div class="metrics"><div class="metric"><strong>${atlas.entities.characters.length}</strong><span>${esc(t('characters'))}</span></div><div class="metric"><strong>${visibleRelations.length}</strong><span>${esc(t('relationships'))}</span></div><div class="metric"><strong>${atlas.entities.locations.length}</strong><span>${esc(t('locations'))}</span></div><div class="metric"><strong>${objectLoreCodex.entries.length}</strong><span>${esc(t('objects_lore'))}</span></div></div><p class="muted">${esc(t('spoiler_safe_on'))} · Recommended image provider: ${esc(providerState.recommended_provider)} · Fallback: ${esc(providerState.fallback_provider)} · Style: ${esc(visualAssetPlan.style_mode)}</p><p><a class="prompt-link" href="prompt-pack.md" target="_blank">Open prompt pack</a></p></section>
      <section class="section" id="characters"><div class="section-head"><h2>${esc(t('characters'))}</h2><p class="muted">Character portraits, aliases, memory labels, and evidence-aware visual profiles.</p></div><div class="grid">${atlas.entities.characters.map(x=>card(x)).join('')||`<div class="empty">${esc(t('no_results'))}</div>`}</div></section>
      <section class="section" id="relationships"><div class="section-head"><h2>${esc(t('relationships'))}</h2><p class="muted">Global, character, faction, and timeline-ready relationship data.</p></div><div class="list">${relationshipWeb.relationships.map(rowRelation).join('')||`<div class="empty">${esc(t('no_results'))}</div>`}</div></section>
      <section class="section" id="locations"><div class="section-head"><h2>${esc(t('locations'))}</h2><p class="muted">Source-grounded places without invented precise geography.</p></div><div class="grid">${locationAtlas.locations.map(x=>card(x,'keyart')).join('')}</div></section>
      <section class="section" id="maps"><div class="section-head"><h2>${esc(t('maps'))}</h2><p class="muted">${esc(mapPlan.disclaimer)}</p></div><div class="map-canvas">${mapPlan.nodes.map(x=>`<button class="map-node" data-entity-id="${esc(x.location_id)}"><strong>${esc(x.label)}</strong><br><small>${esc(x.spatial_notes)}</small></button>`).join('')}</div></section>
      <section class="section" id="objects-lore"><div class="section-head"><h2>${esc(t('objects_lore'))}</h2><p class="muted">Weapons, potions, artifacts, concepts, and worldbuilding entries.</p></div><div class="grid">${objectLoreCodex.entries.map(x=>card(x,'codex')).join('')}</div></section>
      <section class="section" id="technologies-magic"><div class="section-head"><h2>${esc(t('technologies_magic'))}</h2></div><div class="grid">${tech.map(x=>card(x,'codex')).join('')||`<div class="empty">${esc(t('no_results'))}</div>`}</div></section>
      <section class="section" id="timeline"><div class="section-head"><h2>${esc(t('timeline'))}</h2></div><div class="list">${atlas.events.map(e=>{const locked=spoilerState.enabled&&e.spoiler_status==='locked';return `<article class="row ${locked?'locked':''}"><strong>${esc(e.title)}</strong><p>${locked?esc(t('locked_until_later')):esc(e.summary)}</p>${locked?'':evidenceButton(e)}</article>`}).join('')}</div></section>
      <section class="section" id="gallery"><div class="section-head"><h2>${esc(t('gallery'))}</h2></div><div class="gallery">${manifest.assets.map(a=>`<figure><img src="${esc(a.file_path)}" alt="${esc(a.alt_text)}"><figcaption>${esc(a.asset_id)} · ${esc(statusLabel(a.status))}</figcaption>${assetControls(a)}</figure>`).join('')}</div></section>
      <section class="section" id="evidence"><div class="section-head"><h2>${esc(t('evidence'))}</h2><p class="muted">Confirmed, contextual, inferred, and unknown visual fields remain distinct.</p></div><div class="list">${data.visualEvidence.records.map(v=>`<article class="row"><strong>${esc(byId[v.entity_id]?.canonical_name)} · ${esc(v.field)}</strong><p>${esc(v.value)}</p><span class="tag">${esc(v.status)}</span></article>`).join('')}</div></section>
      <section class="section" id="settings"><div class="section-head"><h2>${esc(t('settings'))}</h2></div><div class="settings"><label class="setting"><span>${esc(t('language'))}</span><select id="languageSelect">${Object.keys(allLocales).map(x=>`<option value="${x}" ${x===currentLanguage?'selected':''}>${x} · ${allLocales[x]._status}</option>`).join('')}</select></label><label class="setting"><span>${esc(t('background'))}</span><input class="toggle" id="backgroundToggle" type="checkbox" ${themeProfile.background_enabled?'checked':''}></label><label class="setting"><span>${esc(t('font_size'))}</span><input id="fontSize" type="range" min="14" max="24" value="${localStorage.getItem('storyvista.readerFont')||17}"></label><label class="setting"><span>${esc(t('line_height'))}</span><input id="lineHeight" type="range" min="14" max="24" value="${localStorage.getItem('storyvista.readerLine')||18}"></label><div class="setting"><span>${esc(t('highlights'))}</span><div class="tags">${['character','location','object','lore','organization'].map(x=>`<label><input type="checkbox" class="highlightToggle" value="${x}" checked> ${x}</label>`).join(' ')}</div></div></div></section>`;
      bindSettings();
    }
    function linkedParagraphHtml(paragraph){
      const links=entityLinking.links.filter(x=>x.paragraph_id===paragraph.paragraph_id&&x.status==='resolved').sort((a,b)=>a.start-b.start);let cursor=0,html='';
      links.forEach(link=>{html+=esc(paragraph.text.slice(cursor,link.start));html+=`<span class="entity-highlight type-${esc(link.entity_type)}" data-entity-id="${esc(link.entity_id)}" title="${esc(byId[link.entity_id]?.memory_label||byId[link.entity_id]?.canonical_name)}">${esc(paragraph.text.slice(link.start,link.end))}</span>`;cursor=link.end});
      return html+esc(paragraph.text.slice(cursor));
    }
    function renderReader(){let chapter='';document.getElementById('readerBody').innerHTML=readerText.paragraphs.map(p=>{const head=p.chapter&&p.chapter!==chapter?(chapter=p.chapter,`<h3 class="reader-chapter">${esc(p.chapter)}</h3>`):'';return `${head}<p id="${esc(p.paragraph_id)}" data-progress="${esc(p.paragraph_id)}">${linkedParagraphHtml(p)}</p>`}).join('');document.getElementById('readerFoot').textContent=`${readerText.paragraphs.length} paragraphs · ${languageProfile.input_language}`}
    function openSection(id){document.querySelectorAll('.section').forEach(x=>x.classList.toggle('active',x.id===id));document.querySelectorAll('.nav button').forEach(x=>x.classList.toggle('active',x.dataset.section===id));window.scrollTo({top:0,behavior:'smooth'})}
    function sectionFor(entity){return entity.entity_type==='character'?'characters':entity.entity_type==='location'?'locations':entity.entity_type==='organization'?'overview':'objects-lore'}
    function openEntity(id){const entity=byId[id];if(!entity)return;openSection(sectionFor(entity));setTimeout(()=>{const card=document.getElementById(`card-${id}`);card?.scrollIntoView({behavior:'smooth',block:'center'});card?.classList.add('flash');setTimeout(()=>card?.classList.remove('flash'),1200)},60);showDetail(entity)}
    function showDetail(item){document.getElementById('detailBody').innerHTML=`<div class="eyebrow">${esc(item.entity_type||item.relation_id||item.event_id)}</div><h2>${esc(item.canonical_name||item.title||item.relation_type)}</h2><p class="muted">${esc(item.description||item.memory_label||item.summary||item.role_name||'')}</p>${item.visual_profile?Object.entries(item.visual_profile).map(([k,v])=>`<div class="evidence-block"><strong>${esc(k)}</strong><p>${esc(v.value)} · ${esc(v.status)}</p></div>`).join(''):''}${(item.evidence||[]).map(e=>`<div class="evidence-block"><span class="tag">${esc(e.status)}</span><blockquote>${esc(e.quote)}</blockquote><button class="evidence-btn" data-paragraph="${esc(paragraphForChunk(e.chunk_id))}">${esc(t('jump_to_text'))}</button></div>`).join('')}`;document.getElementById('detail').classList.add('open')}
    function jumpToParagraph(id){if(!id)return;openReader();setTimeout(()=>{const p=document.getElementById(id);p?.scrollIntoView({behavior:'smooth',block:'center'});p?.classList.add('flash');setTimeout(()=>p?.classList.remove('flash'),1400)},80)}
    function openReader(){app.classList.remove('reader-closed');reader.classList.add('mobile-open');document.getElementById('mobileReader').style.display='none';localStorage.setItem('storyvista.readerOpen','1')}
    function closeReader(){if(innerWidth<=1100){reader.classList.remove('mobile-open');document.getElementById('mobileReader').style.display='block'}else app.classList.add('reader-closed');localStorage.setItem('storyvista.readerOpen','0')}
    function bindSettings(){document.getElementById('languageSelect').onchange=e=>{currentLanguage=e.target.value;locale={...allLocales.en,...allLocales[currentLanguage]};renderNav();renderContent();document.getElementById('readerTitle').textContent=t('reader_panel');document.getElementById('search').placeholder=t('search')};document.getElementById('backgroundToggle').onchange=e=>document.body.classList.toggle('background-off',!e.target.checked);document.getElementById('fontSize').oninput=e=>{document.documentElement.style.setProperty('--reader-font',`${e.target.value}px`);localStorage.setItem('storyvista.readerFont',e.target.value)};document.getElementById('lineHeight').oninput=e=>{const v=e.target.value/10;document.documentElement.style.setProperty('--reader-line',v);localStorage.setItem('storyvista.readerLine',e.target.value)};document.querySelectorAll('.highlightToggle').forEach(box=>box.onchange=()=>document.querySelectorAll(`.entity-highlight.type-${box.value}`).forEach(x=>x.style.display=box.checked?'inline':'contents'))}
    renderNav();renderContent();renderReader();
    document.getElementById('readerTitle').textContent=t('reader_panel');document.getElementById('search').placeholder=t('search');document.getElementById('readerSearch').placeholder=t('search');document.getElementById('spoilerBadge').textContent=t('spoiler_safe_on');document.getElementById('sideStatus').textContent=`v0.4 · ${languageProfile.ui_language} · ${providerState.recommended_provider}`;
    const savedWidth=Number(localStorage.getItem('storyvista.readerWidth')||390);document.documentElement.style.setProperty('--reader-width',`${Math.max(300,Math.min(620,savedWidth))}px`);document.documentElement.style.setProperty('--reader-font',`${localStorage.getItem('storyvista.readerFont')||17}px`);document.documentElement.style.setProperty('--reader-line',Number(localStorage.getItem('storyvista.readerLine')||18)/10);if(localStorage.getItem('storyvista.readerOpen')==='0')app.classList.add('reader-closed');
    nav.onclick=e=>{const b=e.target.closest('[data-section]');if(b)openSection(b.dataset.section)};
    document.addEventListener('click',async e=>{const copy=e.target.closest('[data-copy-asset]');if(copy){e.stopPropagation();const asset=manifest.assets.find(x=>x.asset_id===copy.dataset.copyAsset);if(asset){try{await navigator.clipboard.writeText(asset.prompt)}catch{const helper=document.createElement('textarea');helper.value=asset.prompt;helper.style.position='fixed';helper.style.opacity='0';document.body.appendChild(helper);helper.select();document.execCommand('copy');helper.remove()}copy.textContent='Copied';setTimeout(()=>copy.textContent='Copy prompt',1000)}return}const evidence=e.target.closest('[data-paragraph]');if(evidence){e.stopPropagation();jumpToParagraph(evidence.dataset.paragraph);return}const entity=e.target.closest('[data-entity-id]');if(entity)openEntity(entity.dataset.entityId)});
    document.getElementById('detailClose').onclick=()=>document.getElementById('detail').classList.remove('open');document.getElementById('readerClose').onclick=closeReader;document.getElementById('railOpen').onclick=openReader;document.getElementById('mobileReader').onclick=openReader;
    document.getElementById('search').oninput=e=>{const q=e.target.value.toLowerCase();document.querySelectorAll('.searchable').forEach(x=>x.hidden=q&&!x.dataset.search.toLowerCase().includes(q))};document.getElementById('readerSearchButton').onclick=()=>{const q=document.getElementById('readerSearch').value.toLowerCase();const p=[...document.querySelectorAll('#readerBody p')].find(x=>x.textContent.toLowerCase().includes(q));p&&jumpToParagraph(p.id)};
    let drag=false;document.getElementById('readerHandle').onmousedown=()=>drag=true;window.onmouseup=()=>drag=false;window.onmousemove=e=>{if(!drag)return;const width=Math.max(300,Math.min(620,innerWidth-e.clientX));document.documentElement.style.setProperty('--reader-width',`${width}px`);localStorage.setItem('storyvista.readerWidth',width)};
    document.getElementById('readerBody').onscroll=e=>{const paragraphs=[...e.currentTarget.querySelectorAll('p')];const current=paragraphs.find(p=>p.getBoundingClientRect().top>80)||paragraphs.at(-1);if(current)localStorage.setItem('storyvista.readerProgress',current.id)};const progress=localStorage.getItem('storyvista.readerProgress');if(progress)setTimeout(()=>document.getElementById(progress)?.scrollIntoView(),100);
  })();
  </script>
</body>
</html>
