<body>
  <div class="stars"></div><div class="scan"></div>
  <div class="app" id="app">
    <aside class="sidebar"><div class="brand">StoryVista<small>READER VISUAL CODEX</small></div><nav class="nav" id="nav"></nav><div class="side-status" id="sideStatus"></div></aside>
    <main class="main"><div class="topbar"><input class="search" id="search" type="search"><span class="spoiler-badge" id="spoilerBadge"></span></div><div class="content" id="content"></div></main>
    <aside class="reader" id="reader"><div class="reader-handle" id="readerHandle"></div><div class="reader-rail"><button class="reader-toggle" id="railOpen" aria-label="Open reader">‹</button></div><div class="reader-inner"><div class="reader-head"><h2 id="readerTitle"></h2><button class="reader-toggle" id="readerClose" aria-label="Close reader">›</button></div><div class="reader-controls"><input id="readerSearch" type="search"><button class="reader-toggle" id="readerSearchButton" aria-label="Search">⌕</button></div><div class="reader-body" id="readerBody"></div><div class="reader-foot" id="readerFoot"></div></div></aside>
  </div>
  <button class="reader-open-mobile" id="mobileReader" aria-label="Open reader">R</button>
  <aside class="detail" id="detail"><button class="detail-close" id="detailClose" aria-label="Close">×</button><div id="detailBody"></div></aside>
  <script id="storyvista-data" type="application/json">__STORYVISTA_DATA__</script>
  <script>
  (()=>{
    const data=JSON.parse(document.getElementById('storyvista-data').textContent);
    const {atlas,manifest,languageProfile,readerText,entityLinking,relationshipWeb,locationAtlas,mapPlan,objectLoreCodex,spoilerState,providerState,themeProfile,visualAssetPlan,allLocales}=data;
    let locale=data.locale, currentLanguage=languageProfile.ui_language;
    const app=document.getElementById('app'), reader=document.getElementById('reader'), content=document.getElementById('content'), nav=document.getElementById('nav');
    const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const t=k=>locale[k]||allLocales.en[k]||k;
    const entities=[...atlas.entities.characters,...atlas.entities.locations,...(atlas.entities.organizations||[]),...(atlas.entities.objects||[]),...(atlas.entities.concepts||[])];
    const byId=Object.fromEntries(entities.map(x=>[x.entity_id,x]));
    const assetsByEntity={}; manifest.assets.forEach(a=>(assetsByEntity[a.bound_to]??=[]).push(a));
    const sections=[['overview','overview'],['characters','characters'],['relationships','relationships'],['locations','locations'],['maps','maps'],['objects-lore','objects_lore'],['technologies-magic','technologies_magic'],['timeline','timeline'],['gallery','gallery'],['evidence','evidence'],['settings','settings']];
    document.documentElement.lang=currentLanguage; document.documentElement.dir=languageProfile.writing_direction;
    themeProfile.palette.forEach((color,index)=>document.documentElement.style.setProperty(['--bg','--text','--accent','--cyan','--red'][index],color));
    function assetFor(id,type){const items=assetsByEntity[id]||[];return items.find(x=>!type||x.asset_id.includes(type))||items[0]||null}
    function imageFor(id,type){return assetFor(id,type)?.file_path||''}
    function statusLabel(status){return ({generated:'Generated',generated_external:'Generated',user_provided:'User provided',pending_external_generation:'External generation pending',prompt_only_ready:'Prompt ready',placeholder:'Placeholder fallback',failed:'Failed',skipped:'Skipped',planned:'Planned'})[status]||status.replaceAll('_',' ')}
    function assetControls(asset){if(!asset)return'';const pending=['pending_external_generation','prompt_only_ready','placeholder'].includes(asset.status);return `<details class="asset-meta"><summary>Actions / Technical · ${esc(statusLabel(asset.status))}</summary>${pending?`<code>${esc(asset.expected_filename)}</code><div class="asset-actions"><button class="prompt-btn" data-copy-asset="${esc(asset.asset_id)}">Copy prompt</button><a class="prompt-link" href="prompt-pack.md" target="_blank">Open prompt pack</a></div><small class="muted">Generate externally, save with this filename, then run bind-images.</small>`:`<span class="asset-status ${esc(asset.status)}">${esc(statusLabel(asset.status))}</span>`}</details>`}
    function evidenceButton(item){const ev=item.evidence?.[0];return ev?`<button class="evidence-btn" data-paragraph="${esc(paragraphForChunk(ev.chunk_id))}">${esc(t('jump_to_text'))}</button>`:''}
    function paragraphForChunk(chunk){return readerText.paragraphs.find(p=>p.chunk_id===chunk)?.paragraph_id||readerText.paragraphs[0]?.paragraph_id||''}
    function usableAsset(asset){return asset&&!['pending_external_generation','prompt_only_ready','placeholder','planned','skipped','failed'].includes(asset.status)}
    function fallbackType(item,kind){if(kind==='map')return'map';if(item.entity_type==='character')return'character';if(item.entity_type==='location')return'location';if(item.entity_type==='lore'||/concept|technology|magic/i.test(item.entity_type||item.category||''))return'lore';return'object'}
    function initials(name){return String(name||'?').split(/\s+/).filter(Boolean).slice(0,2).map(x=>x[0]).join('').toUpperCase()||'?'}
    function fallbackVisual(item,kind='portrait'){const type=fallbackType(item,kind);const label={character:'CHARACTER DOSSIER',location:'SPATIAL RECORD',object:'OBJECT SCAN',lore:'LORE SIGNAL',map:'STAR MAP'}[type];return `<div class="art fallback-art fallback-${type}" aria-label="${esc(label)}"><div class="fallback-glyph"><span>${esc(initials(item.canonical_name||item.label))}</span></div><div class="fallback-label">${esc(label)}</div></div>`}
    function visualFor(item,kind='portrait'){const asset=assetFor(item.entity_id,kind)||assetFor(item.entity_id);return usableAsset(asset)?`<img class="art" src="${esc(asset.file_path)}" alt="${esc(item.canonical_name)}">`:fallbackVisual(item,kind)}
    function tagList(item){return [...(item.aliases||[]),...(item.visual_keywords||[]),...(item.mood||[])].slice(0,5)}
    function card(item,kind='portrait'){const asset=assetFor(item.entity_id,kind)||assetFor(item.entity_id);const cardClass=`card card-${esc(item.entity_type||'entry')} searchable`;return `<article class="${cardClass}" id="card-${esc(item.entity_id)}" data-entity-id="${esc(item.entity_id)}" data-search="${esc(JSON.stringify(item))}">${visualFor(item,kind)}<div class="card-body"><div class="kicker">${esc(item.entity_type)} · ${esc(item.category||item.role_name||item.location_type||'')}</div><h3>${esc(item.canonical_name)}</h3><p>${esc(item.memory_label||item.description||item.faction||item.spatial_notes||'')}</p><div class="tags">${tagList(item).map(x=>`<span class="tag">${esc(x)}</span>`).join('')}</div>${assetControls(asset)}<p>${evidenceButton(item)}</p></div></article>`}
    function rosterTile(item){const asset=assetFor(item.entity_id,'portrait')||assetFor(item.entity_id);const visual=usableAsset(asset)?`<img src="${esc(asset.file_path)}" alt="${esc(item.canonical_name)}">`:fallbackVisual(item,'portrait');return `<button class="roster-tile searchable" data-entity-id="${esc(item.entity_id)}" data-search="${esc(JSON.stringify(item))}">${visual}<span class="roster-label">${esc(item.role_name||item.category||item.entity_type)}<b>${esc(item.canonical_name)}</b></span></button>`}
    function constellation(items){const picked=items.slice(0,9);if(!picked.length)return `<div class="empty">${esc(t('no_results'))}</div>`;const points=[[50,18],[24,32],[76,32],[18,58],[50,52],[82,58],[32,78],[68,78],[50,88]];return `<div class="constellation">${picked.map((item,index)=>`<button class="constellation-node ${index===0?'core':''}" style="left:${points[index][0]}%;top:${points[index][1]}%" data-entity-id="${esc(item.entity_id)}">${esc(item.canonical_name)}</button>`).join('')}</div>`}
    function atlasSignalPanel(){const groups=[['Characters',atlas.entities.characters.length],['Relations',relationshipWeb.relationships.length],['Locations',atlas.entities.locations.length],['Objects & Lore',objectLoreCodex.entries.length]];return `<div class="mini-panel"><div class="eyebrow">Story Atlas Signal</div><div class="metrics">${groups.map(([label,count])=>`<div class="metric"><strong>${count}</strong><span>${esc(label)}</span></div>`).join('')}</div><p class="muted">${esc(t('spoiler_safe_on'))} · ${esc(themeProfile.theme_id)} · ${esc(providerState.recommended_provider)} prompt workflow ready</p><p><a class="prompt-link" href="prompt-pack.md" target="_blank">Open prompt pack</a></p></div>`}
    function rowRelation(r){const locked=spoilerState.enabled&&r.spoiler_status==='locked';return `<article class="row searchable ${locked?'locked':''}" data-search="${esc(JSON.stringify(r))}"><div><strong>${esc(byId[r.source_entity_id]?.canonical_name||r.source_name)} → ${esc(byId[r.target_entity_id]?.canonical_name||r.target_name)}</strong><p>${locked?esc(t('locked_until_later')):esc(r.relation_type)}</p></div><div>${locked?'':esc(r.stage)}</div>${locked?'':evidenceButton(r)}</article>`}
    function relationTone(r){return r.polarity==='negative'?'negative':r.polarity==='positive'?'positive':'neutral'}
    function relationDetail(r){if(!r)return`<div class="eyebrow">Intelligence Dossier</div><h3>No visible relationship selected</h3><p class="muted">Select a node or signal line.</p>`;const locked=spoilerState.enabled&&r.spoiler_status==='locked';if(locked)return`<div class="eyebrow">Locked Signal</div><h3>${esc(t('locked_until_later'))}</h3>`;return `<div class="eyebrow">Intelligence Dossier</div><h3>${esc(byId[r.source_entity_id]?.canonical_name||r.source_name)} → ${esc(byId[r.target_entity_id]?.canonical_name||r.target_name)}</h3><p>${esc(r.relation_type)}</p><div class="strength-meter"><span style="width:${Math.round((r.strength||.5)*100)}%"></span></div><div class="dossier-line"><span>Polarity</span><b>${esc(r.polarity||'neutral')}</b></div><div class="dossier-line"><span>Stage</span><b>${esc(r.stage||'current')}</b></div><div class="dossier-line"><span>Status</span><b>${esc(r.status||'explicit')}</b></div>${evidenceButton(r)}`;}
    function relationshipAvatar(entity){const asset=assetFor(entity.entity_id,'portrait')||assetFor(entity.entity_id);if(usableAsset(asset))return `<div class="relation-avatar"><img src="${esc(asset.file_path)}" alt="${esc(entity.canonical_name||entity.entity_id||'Archive portrait')}"></div>`;return `<div class="relation-avatar">${fallbackVisual(entity,'portrait')}</div>`}
    function relationshipNetwork(relations){const visible=relations.filter(r=>!(spoilerState.enabled&&r.spoiler_status==='locked'));if(!visible.length)return`<div class="empty">${esc(t('no_results'))}</div>`;const ids=[...new Set(visible.flatMap(r=>[r.source_entity_id,r.target_entity_id]))].filter(Boolean);const center={x:50,y:50};const positions={};ids.forEach((id,index)=>{const angle=(-90+(360/Math.max(ids.length,1))*index)*Math.PI/180;const radius=ids.length<=3?28:34;positions[id]={x:center.x+Math.cos(angle)*radius,y:center.y+Math.sin(angle)*radius}});const lines=visible.map(r=>{const a=positions[r.source_entity_id]||center,b=positions[r.target_entity_id]||center,mx=(a.x+b.x)/2,my=(a.y+b.y)/2,tone=relationTone(r),width=.18+Math.max(.2,r.strength||.5)*.55;return `<g data-relation-id="${esc(r.relation_id)}"><line class="relation-edge ${tone}" x1="${a.x}%" y1="${a.y}%" x2="${b.x}%" y2="${b.y}%" style="stroke-width:${width}"></line><line class="relation-edge-hot" x1="${a.x}%" y1="${a.y}%" x2="${b.x}%" y2="${b.y}%"></line><text class="relation-label ${tone}" x="${mx}%" y="${my}%">${esc(r.relation_type)}</text></g>`}).join('');const nodes=ids.map(id=>{const p=positions[id],entity=byId[id]||{entity_id:id};return `<button class="relation-node" style="left:${p.x}%;top:${p.y}%" data-focus-entity="${esc(id)}">${relationshipAvatar(entity)}<span class="relation-copy"><strong>${esc(entity.canonical_name||id)}</strong><span>${esc(entity.role_name||entity.faction||entity.entity_type||'archive node')}</span></span></button>`}).join('');return `<div class="relationship-atlas"><div class="relation-network"><svg class="relation-svg" viewBox="0 0 100 100" preserveAspectRatio="none">${lines}</svg>${nodes}</div><aside class="relation-dossier" id="relationshipDetail">${relationDetail(visible[0])}</aside></div>`}
    function showRelationDetail(relationId,entityId){const relations=relationshipWeb.relationships.filter(r=>!(spoilerState.enabled&&r.spoiler_status==='locked'));const found=relationId?relations.find(r=>r.relation_id===relationId):relations.find(r=>r.source_entity_id===entityId||r.target_entity_id===entityId);const panel=document.getElementById('relationshipDetail');if(panel)panel.innerHTML=relationDetail(found)}
    function mapNetwork(){const nodes=mapPlan.nodes||[];if(!nodes.length)return`<div class="empty">${esc(t('no_results'))}</div>`;const points=[[15,24],[50,52],[82,25],[28,78],[70,78],[50,18]];const route=nodes.slice(1).map((n,i)=>{const a=points[i%points.length],b=points[(i+1)%points.length];return`<line x1="${a[0]}%" y1="${a[1]}%" x2="${b[0]}%" y2="${b[1]}%"></line>`}).join('');return `<div class="map-canvas"><div class="map-zone one"></div><div class="map-zone two"></div><div class="map-zone three"></div><svg class="map-route" viewBox="0 0 100 100" preserveAspectRatio="none">${route}</svg>${nodes.map((x,index)=>{const p=points[index%points.length];return `<button class="map-node" style="left:${p[0]}%;top:${p[1]}%" data-entity-id="${esc(x.location_id)}"><strong>${esc(x.label)}</strong><br><small>${esc(x.spatial_notes)}</small></button>`}).join('')}</div>`}
    function renderNav(){nav.innerHTML=sections.map((s,i)=>`<button data-section="${s[0]}" class="${i===0?'active':''}">${esc(t(s[1]))}</button>`).join('')}
    function renderContent(){
      const visibleRelations=relationshipWeb.relationships.filter(r=>!(spoilerState.enabled&&r.spoiler_status==='locked'));
      const tech=objectLoreCodex.entries.filter(x=>/tech|magic|weapon|科技|魔法|武器/i.test(`${x.category} ${x.description}`));
      content.innerHTML=`
      <section class="section active" id="overview"><div class="terminal hero"><div class="hero-meta">StoryVista · Visual Story Atlas</div><h1>${esc(atlas.metadata.title)}</h1><p class="lede">${esc(atlas.summary)}</p><div class="roster-strip">${atlas.entities.characters.slice(0,8).map(rosterTile).join('')||manifest.assets.slice(0,4).map(a=>`<button class="roster-tile"><img src="${esc(a.file_path)}" alt="${esc(a.alt_text)}"><span class="roster-label">${esc(statusLabel(a.status))}<b>${esc(a.asset_id)}</b></span></button>`).join('')}</div><div class="overview-grid"><div class="mini-panel"><div class="eyebrow">Relationship Field</div>${constellation(atlas.entities.characters)}</div>${atlasSignalPanel()}</div></div></section>
      <section class="section" id="characters"><div class="section-head"><h2>${esc(t('characters'))}</h2><p class="muted">Character portraits, aliases, memory labels, and evidence-aware visual profiles.</p></div><div class="grid">${atlas.entities.characters.map(x=>card(x)).join('')||`<div class="empty">${esc(t('no_results'))}</div>`}</div></section>
      <section class="section" id="relationships"><div class="section-head"><h2>${esc(t('relationships'))}</h2><p class="muted">Signal lines, emotional polarity, relationship strength, and spoiler-safe intelligence details.</p></div>${relationshipNetwork(relationshipWeb.relationships)}</section>
      <section class="section" id="locations"><div class="section-head"><h2>${esc(t('locations'))}</h2><p class="muted">Source-grounded places without invented precise geography.</p></div><div class="grid">${locationAtlas.locations.map(x=>card(x,'keyart')).join('')}</div></section>
      <section class="section" id="maps"><div class="section-head"><h2>${esc(t('maps'))}</h2><p class="muted">${esc(mapPlan.disclaimer)}</p></div>${mapNetwork()}</section>
      <section class="section" id="objects-lore"><div class="section-head"><h2>${esc(t('objects_lore'))}</h2><p class="muted">Weapons, potions, artifacts, concepts, and worldbuilding entries.</p></div><div class="grid">${objectLoreCodex.entries.map(x=>card(x,'codex')).join('')}</div></section>
      <section class="section" id="technologies-magic"><div class="section-head"><h2>${esc(t('technologies_magic'))}</h2></div><div class="grid">${tech.map(x=>card(x,'codex')).join('')||`<div class="empty">${esc(t('no_results'))}</div>`}</div></section>
      <section class="section" id="timeline"><div class="section-head"><h2>${esc(t('timeline'))}</h2></div><div class="list">${atlas.events.map(e=>{const locked=spoilerState.enabled&&e.spoiler_status==='locked';return `<article class="row ${locked?'locked':''}"><strong>${esc(e.title)}</strong><p>${locked?esc(t('locked_until_later')):esc(e.summary)}</p>${locked?'':evidenceButton(e)}</article>`}).join('')}</div></section>
      <section class="section" id="gallery"><div class="section-head"><h2>${esc(t('gallery'))}</h2></div><div class="gallery">${manifest.assets.map(a=>`<figure><img src="${esc(a.file_path)}" alt="${esc(a.alt_text)}"><figcaption>${esc(a.asset_id)} · ${esc(statusLabel(a.status))}</figcaption>${assetControls(a)}</figure>`).join('')}</div></section>
      <section class="section" id="evidence"><div class="section-head"><h2>${esc(t('evidence'))}</h2><p class="muted">Confirmed, contextual, inferred, and unknown visual fields remain distinct.</p></div><div class="list">${data.visualEvidence.records.map(v=>`<article class="row"><strong>${esc(byId[v.entity_id]?.canonical_name)} · ${esc(v.field)}</strong><p>${esc(v.value)}</p><span class="tag">${esc(v.status)}</span></article>`).join('')}</div></section>
      <section class="section" id="settings"><div class="section-head"><h2>${esc(t('settings'))}</h2></div><div class="settings"><label class="setting"><span>${esc(t('language'))}</span><select id="languageSelect">${Object.keys(allLocales).map(x=>`<option value="${x}" ${x===currentLanguage?'selected':''}>${x} · ${allLocales[x]._status}</option>`).join('')}</select></label><label class="setting"><span>${esc(t('background'))}</span><input class="toggle" id="backgroundToggle" type="checkbox" ${themeProfile.background_enabled?'checked':''}></label><label class="setting"><span>${esc(t('font_size'))}</span><input id="fontSize" type="range" min="14" max="24" value="${localStorage.getItem('storyvista.readerFont')||17}"></label><label class="setting"><span>${esc(t('line_height'))}</span><input id="lineHeight" type="range" min="14" max="24" value="${localStorage.getItem('storyvista.readerLine')||18}"></label><div class="setting"><span>${esc(t('highlights'))}</span><div class="tags">${['character','location','object','lore','organization'].map(x=>`<label><input type="checkbox" class="highlightToggle" value="${x}" checked> ${x}</label>`).join(' ')}</div></div></div></section>`;
      bindSettings();
    }
    function linkedParagraphHtml(paragraph){
      const links=entityLinking.links.filter(x=>x.paragraph_id===paragraph.paragraph_id&&x.status==='resolved').sort((a,b)=>a.start-b.start);let cursor=0,html='';
      links.forEach(link=>{html+=esc(paragraph.text.slice(cursor,link.start));html+=`<span class="entity-highlight type-${esc(link.entity_type)}" data-entity-id="${esc(link.entity_id)}" title="${esc(byId[link.entity_id]?.memory_label||byId[link.entity_id]?.canonical_name)}">${esc(paragraph.text.slice(link.start,link.end))}</span>`;cursor=link.end});
      return html+esc(paragraph.text.slice(cursor));
    }
    function renderReader(){let chapter='';document.getElementById('readerBody').innerHTML=readerText.paragraphs.map(p=>{const head=p.chapter&&p.chapter!==chapter?(chapter=p.chapter,`<h3 class="reader-chapter">${esc(p.chapter)}</h3>`):'';return `${head}<p id="${esc(p.paragraph_id)}" data-progress="${esc(p.paragraph_id)}">${linkedParagraphHtml(p)}</p>`}).join('');document.getElementById('readerFoot').textContent=`${readerText.paragraphs.length} paragraphs · ${languageProfile.input_language}`}
    function openSection(id){document.querySelectorAll('.section').forEach(x=>x.classList.toggle('active',x.id===id));document.querySelectorAll('.nav button').forEach(x=>x.classList.toggle('active',x.dataset.section===id));window.scrollTo({top:0,behavior:'smooth'})}
    function sectionFor(entity){return entity.entity_type==='character'?'characters':entity.entity_type==='location'?'locations':entity.entity_type==='organization'?'overview':'objects-lore'}
    function openEntity(id){const entity=byId[id];if(!entity)return;openSection(sectionFor(entity));setTimeout(()=>{const card=document.getElementById(`card-${id}`);card?.scrollIntoView({behavior:'smooth',block:'center'});card?.classList.add('flash');setTimeout(()=>card?.classList.remove('flash'),1200)},60);showDetail(entity)}
    function showDetail(item){document.getElementById('detailBody').innerHTML=`<div class="eyebrow">${esc(item.entity_type||item.relation_id||item.event_id)}</div><h2>${esc(item.canonical_name||item.title||item.relation_type)}</h2><p class="muted">${esc(item.description||item.memory_label||item.summary||item.role_name||'')}</p>${item.visual_profile?Object.entries(item.visual_profile).map(([k,v])=>`<div class="evidence-block"><strong>${esc(k)}</strong><p>${esc(v.value)} · ${esc(v.status)}</p></div>`).join(''):''}${(item.evidence||[]).map(e=>`<div class="evidence-block"><span class="tag">${esc(e.status)}</span><blockquote>${esc(e.quote)}</blockquote><button class="evidence-btn" data-paragraph="${esc(paragraphForChunk(e.chunk_id))}">${esc(t('jump_to_text'))}</button></div>`).join('')}`;document.getElementById('detail').classList.add('open')}
    function jumpToParagraph(id){if(!id)return;openReader();setTimeout(()=>{const p=document.getElementById(id);p?.scrollIntoView({behavior:'smooth',block:'center'});p?.classList.add('flash');setTimeout(()=>p?.classList.remove('flash'),1400)},80)}
    function openReader(){app.classList.remove('reader-closed');reader.classList.add('mobile-open');document.getElementById('mobileReader').style.display='none';localStorage.setItem('storyvista.readerOpen','1')}
    function closeReader(){if(innerWidth<=1100){reader.classList.remove('mobile-open');document.getElementById('mobileReader').style.display='block'}else app.classList.add('reader-closed');localStorage.setItem('storyvista.readerOpen','0')}
    function bindSettings(){document.getElementById('languageSelect').onchange=e=>{currentLanguage=e.target.value;locale={...allLocales.en,...allLocales[currentLanguage]};renderNav();renderContent();document.getElementById('readerTitle').textContent=t('reader_panel');document.getElementById('search').placeholder=t('search')};document.getElementById('backgroundToggle').onchange=e=>document.body.classList.toggle('background-off',!e.target.checked);document.getElementById('fontSize').oninput=e=>{document.documentElement.style.setProperty('--reader-font',`${e.target.value}px`);localStorage.setItem('storyvista.readerFont',e.target.value)};document.getElementById('lineHeight').oninput=e=>{const v=e.target.value/10;document.documentElement.style.setProperty('--reader-line',v);localStorage.setItem('storyvista.readerLine',e.target.value)};document.querySelectorAll('.highlightToggle').forEach(box=>box.onchange=()=>document.querySelectorAll(`.entity-highlight.type-${box.value}`).forEach(x=>x.style.display=box.checked?'inline':'contents'))}
    renderNav();renderContent();renderReader();
    document.getElementById('readerTitle').textContent=t('reader_panel');document.getElementById('search').placeholder=t('search');document.getElementById('readerSearch').placeholder=t('search');document.getElementById('spoilerBadge').textContent=t('spoiler_safe_on');document.getElementById('sideStatus').textContent=`v0.4 · ${languageProfile.ui_language} · ${providerState.recommended_provider}`;
    const savedWidth=Number(localStorage.getItem('storyvista.readerWidth')||390);document.documentElement.style.setProperty('--reader-width',`${Math.max(300,Math.min(620,savedWidth))}px`);document.documentElement.style.setProperty('--reader-font',`${localStorage.getItem('storyvista.readerFont')||17}px`);document.documentElement.style.setProperty('--reader-line',Number(localStorage.getItem('storyvista.readerLine')||18)/10);if(localStorage.getItem('storyvista.readerOpen')!=='1')app.classList.add('reader-closed');
    nav.onclick=e=>{const b=e.target.closest('[data-section]');if(b)openSection(b.dataset.section)};
    document.addEventListener('click',async e=>{const copy=e.target.closest('[data-copy-asset]');if(copy){e.stopPropagation();const asset=manifest.assets.find(x=>x.asset_id===copy.dataset.copyAsset);if(asset){try{await navigator.clipboard.writeText(asset.prompt)}catch{const helper=document.createElement('textarea');helper.value=asset.prompt;helper.style.position='fixed';helper.style.opacity='0';document.body.appendChild(helper);helper.select();document.execCommand('copy');helper.remove()}copy.textContent='Copied';setTimeout(()=>copy.textContent='Copy prompt',1000)}return}const rel=e.target.closest('[data-relation-id]');if(rel){e.stopPropagation();showRelationDetail(rel.dataset.relationId);return}const focus=e.target.closest('[data-focus-entity]');if(focus){e.stopPropagation();showRelationDetail(null,focus.dataset.focusEntity);return}const evidence=e.target.closest('[data-paragraph]');if(evidence){e.stopPropagation();jumpToParagraph(evidence.dataset.paragraph);return}const entity=e.target.closest('[data-entity-id]');if(entity)openEntity(entity.dataset.entityId)});
    document.addEventListener('mouseover',e=>{const rel=e.target.closest('[data-relation-id]');if(rel){showRelationDetail(rel.dataset.relationId);return}const focus=e.target.closest('[data-focus-entity]');if(focus)showRelationDetail(null,focus.dataset.focusEntity)});
    document.getElementById('detailClose').onclick=()=>document.getElementById('detail').classList.remove('open');document.getElementById('readerClose').onclick=closeReader;document.getElementById('railOpen').onclick=openReader;document.getElementById('mobileReader').onclick=openReader;
    document.getElementById('search').oninput=e=>{const q=e.target.value.toLowerCase();document.querySelectorAll('.searchable').forEach(x=>x.hidden=q&&!x.dataset.search.toLowerCase().includes(q))};document.getElementById('readerSearchButton').onclick=()=>{const q=document.getElementById('readerSearch').value.toLowerCase();const p=[...document.querySelectorAll('#readerBody p')].find(x=>x.textContent.toLowerCase().includes(q));p&&jumpToParagraph(p.id)};
    let drag=false;document.getElementById('readerHandle').onmousedown=()=>drag=true;window.onmouseup=()=>drag=false;window.onmousemove=e=>{if(!drag)return;const width=Math.max(300,Math.min(620,innerWidth-e.clientX));document.documentElement.style.setProperty('--reader-width',`${width}px`);localStorage.setItem('storyvista.readerWidth',width)};
    document.getElementById('readerBody').onscroll=e=>{const paragraphs=[...e.currentTarget.querySelectorAll('p')];const current=paragraphs.find(p=>p.getBoundingClientRect().top>80)||paragraphs.at(-1);if(current)localStorage.setItem('storyvista.readerProgress',current.id)};const progress=localStorage.getItem('storyvista.readerProgress');if(progress)setTimeout(()=>document.getElementById(progress)?.scrollIntoView(),100);
  })();
  </script>
