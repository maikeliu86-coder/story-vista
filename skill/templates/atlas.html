<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StoryVista Reader Visual Codex</title>
  <style>
    :root{--bg:#0d1114;--panel:#151b1e;--panel2:#1d2528;--line:#344044;--text:#e7e4dc;--muted:#9ca8a7;--accent:#b89456;--cyan:#5fa8b3;--red:#bd5b57;--green:#78a47e;--reader-width:390px;--reader-font:17px;--reader-line:1.8;--radius:6px}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,sans-serif}button,input,select{font:inherit}button{color:inherit}.app{min-height:100vh;display:grid;grid-template-columns:220px minmax(0,1fr) var(--reader-width)}.app.reader-closed{grid-template-columns:220px minmax(0,1fr) 42px}.sidebar{position:sticky;top:0;height:100vh;padding:24px 16px;border-right:1px solid var(--line);background:#101518;z-index:5}.brand{font:600 23px Georgia,serif;color:var(--accent)}.brand small{display:block;margin-top:5px;font:10px Inter,sans-serif;color:var(--muted);letter-spacing:2px}.nav{display:grid;gap:3px;margin-top:30px}.nav button{min-height:38px;padding:8px 10px;border:0;border-left:2px solid transparent;background:transparent;color:var(--muted);text-align:left;cursor:pointer}.nav button:hover,.nav button.active{color:var(--text);border-color:var(--accent);background:var(--panel)}.side-status{position:absolute;left:16px;right:16px;bottom:20px;color:var(--muted);font-size:11px;line-height:1.55}.main{min-width:0}.topbar{position:sticky;top:0;z-index:4;display:flex;gap:10px;align-items:center;padding:13px 22px;border-bottom:1px solid var(--line);background:#0d1114f2}.search{width:min(520px,100%);padding:10px 12px;border:1px solid var(--line);border-radius:4px;background:var(--panel);color:var(--text)}.spoiler-badge{margin-left:auto;color:var(--green);font-size:12px}.content{padding:32px 30px 70px;max-width:1400px;margin:auto}.section{display:none}.section.active{display:block}.section-head{display:flex;align-items:end;justify-content:space-between;gap:20px;margin-bottom:22px;padding-bottom:14px;border-bottom:1px solid var(--line)}h1,h2,h3{margin:0;font-family:Georgia,'Noto Serif SC',serif;font-weight:500;letter-spacing:0}h1{font-size:clamp(36px,5vw,68px);max-width:900px}h2{font-size:29px}h3{font-size:19px}.eyebrow{color:var(--accent);font-size:11px;letter-spacing:2px;text-transform:uppercase}.lede{max-width:820px;color:#c0c4bf;font:18px/1.75 Georgia,'Noto Serif SC',serif}.muted{color:var(--muted)}.metrics{display:grid;grid-template-columns:repeat(4,1fr);margin:28px 0;border-block:1px solid var(--line)}.metric{padding:18px;border-right:1px solid var(--line)}.metric:last-child{border:0}.metric strong{display:block;color:var(--accent);font:32px Georgia,serif}.metric span{font-size:12px;color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:13px}.card{min-width:0;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--panel);cursor:pointer}.card:hover,.card.flash{border-color:var(--accent)}.art{display:block;width:100%;aspect-ratio:4/3;object-fit:cover;background:#0b0e10}.card-body{padding:15px}.kicker{font-size:10px;color:var(--accent);letter-spacing:1.5px;text-transform:uppercase}.card h3{margin-top:7px}.card p{font-size:13px;line-height:1.55;color:var(--muted)}.tags{display:flex;gap:6px;flex-wrap:wrap}.tag{padding:3px 6px;border:1px solid var(--line);border-radius:3px;color:var(--muted);font-size:10px}.evidence-btn{border:1px solid #53695a;background:transparent;color:#9fc3a5;padding:5px 7px;border-radius:3px;cursor:pointer;font-size:11px}.list{display:grid;gap:9px}.row{display:grid;grid-template-columns:minmax(180px,.6fr) minmax(0,1fr) auto;gap:18px;align-items:center;padding:16px;border:1px solid var(--line);background:var(--panel)}.row p{margin:5px 0 0;color:var(--muted);font-size:13px}.locked{opacity:.6}.locked::after{content:'LOCKED';color:var(--red);font-size:10px;letter-spacing:2px}.map-canvas{position:relative;min-height:420px;border:1px solid var(--line);background:#111719;overflow:hidden}.map-node{position:absolute;width:150px;padding:14px;border:1px solid var(--accent);background:var(--panel);text-align:center}.map-node:nth-child(1){left:8%;top:16%}.map-node:nth-child(2){left:42%;top:48%}.map-node:nth-child(3){right:8%;top:20%}.map-node:nth-child(n+4){position:relative;display:inline-block;margin:18px}.gallery{columns:3 220px;column-gap:12px}.gallery figure{break-inside:avoid;margin:0 0 12px;border:1px solid var(--line);background:var(--panel)}.gallery img{width:100%;display:block}.gallery figcaption{padding:9px;color:var(--muted);font-size:11px}.settings{max-width:700px}.setting{display:grid;grid-template-columns:220px 1fr;gap:18px;align-items:center;padding:15px 0;border-bottom:1px solid var(--line)}.setting select,.setting input[type=range]{width:100%}.toggle{width:42px;height:24px}.reader{position:sticky;top:0;height:100vh;border-left:1px solid var(--line);background:#111719;overflow:hidden;z-index:8}.reader-handle{position:absolute;left:-4px;top:0;width:8px;height:100%;cursor:col-resize}.reader-rail{display:none;height:100%;align-items:start;justify-content:center;padding-top:18px}.reader-closed .reader-rail{display:flex}.reader-closed .reader-inner{display:none}.reader-toggle{width:34px;height:34px;border:1px solid var(--line);background:var(--panel);cursor:pointer}.reader-inner{height:100%;display:grid;grid-template-rows:auto auto minmax(0,1fr) auto}.reader-head{display:flex;align-items:center;gap:9px;padding:14px;border-bottom:1px solid var(--line)}.reader-head h2{font-size:20px}.reader-controls{display:flex;gap:7px;padding:10px 14px;border-bottom:1px solid var(--line)}.reader-controls input{min-width:0;flex:1;padding:8px;border:1px solid var(--line);background:var(--panel);color:var(--text)}.reader-body{overflow:auto;padding:20px 22px;scroll-behavior:smooth}.reader-body p{margin:0 0 20px;font:var(--reader-font)/var(--reader-line) Georgia,'Noto Serif SC',serif;color:#dddcd5}.reader-body p.flash{background:#b8945626;outline:1px solid var(--accent)}.reader-chapter{margin:22px 0 12px;color:var(--accent);font:18px Georgia,serif}.entity-highlight{border-bottom:1px solid currentColor;cursor:pointer}.entity-highlight.type-character{color:#d7b36a}.entity-highlight.type-location{color:#71aebb}.entity-highlight.type-object,.entity-highlight.type-lore{color:#b287c8}.entity-highlight.type-organization{color:#80a985}.entity-highlight:hover{background:#ffffff12}.reader-foot{padding:10px 14px;border-top:1px solid var(--line);color:var(--muted);font-size:11px}.reader-open-mobile{display:none;position:fixed;right:16px;bottom:16px;z-index:12;width:48px;height:48px;border:1px solid var(--accent);border-radius:50%;background:var(--panel);cursor:pointer}.detail{position:fixed;inset:0 0 0 auto;z-index:20;width:min(430px,92vw);padding:24px;overflow:auto;border-left:1px solid var(--accent);background:#151b1e;transform:translateX(100%);transition:transform .2s}.detail.open{transform:none}.detail-close{float:right;width:34px;height:34px;border:1px solid var(--line);background:transparent;cursor:pointer}.evidence-block{margin-top:13px;padding:13px;border-left:2px solid var(--accent);background:#101518}.evidence-block blockquote{margin:8px 0;color:#c8c7c0;line-height:1.55}.background-off{--bg:#111;--panel:#181818;--panel2:#202020}.empty{padding:22px;border:1px dashed var(--line);color:var(--muted)}
    @media(max-width:1100px){.app,.app.reader-closed{grid-template-columns:190px minmax(0,1fr)}.reader{position:fixed;inset:0;display:none;height:100vh}.reader.mobile-open{display:block}.reader-handle,.reader-rail{display:none}.reader-inner{display:grid}.reader-open-mobile{display:block}.metrics{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:700px){.app,.app.reader-closed{display:block}.sidebar{position:sticky;height:auto;padding:14px}.brand small,.side-status{display:none}.nav{display:flex;overflow:auto;margin-top:12px}.nav button{white-space:nowrap;border-left:0;border-bottom:2px solid transparent}.topbar{top:93px;padding:10px 14px}.spoiler-badge{display:none}.content{padding:24px 14px 70px}.grid{grid-template-columns:1fr}.row{grid-template-columns:1fr}.section-head{display:block}.section-head p{margin-bottom:0}.setting{grid-template-columns:1fr}.gallery{columns:1}.metrics{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
  <div class="app" id="app">
    <aside class="sidebar"><div class="brand">StoryVista<small>READER VISUAL CODEX</small></div><nav class="nav" id="nav"></nav><div class="side-status" id="sideStatus"></div></aside>
    <main class="main"><div class="topbar"><input class="search" id="search" type="search"><span class="spoiler-badge" id="spoilerBadge"></span></div><div class="content" id="content"></div></main>
    <aside class="reader" id="reader"><div class="reader-handle" id="readerHandle"></div><div class="reader-rail"><button class="reader-toggle" id="railOpen" aria-label="Open reader">‹</button></div><div class="reader-inner"><div class="reader-head"><h2 id="readerTitle"></h2><button class="reader-toggle" id="readerClose" aria-label="Close reader">›</button></div><div class="reader-controls"><input id="readerSearch" type="search"><button class="reader-toggle" id="readerSearchButton" aria-label="Search">⌕</button></div><div class="reader-body" id="readerBody"></div><div class="reader-foot" id="readerFoot"></div></div></aside>
  </div>
  <button class="reader-open-mobile" id="mobileReader" aria-label="Open reader">R</button>
  <aside class="detail" id="detail"><button class="detail-close" id="detailClose" aria-label="Close">×</button><div id="detailBody"></div></aside>
  <script id="storyvista-data" type="application/json">__STORYVISTA_DATA__</script>
  <script>
  (()=>{
    const data=JSON.parse(document.getElementById('storyvista-data').textContent);
    const {atlas,manifest,languageProfile,readerText,entityLinking,relationshipWeb,locationAtlas,mapPlan,objectLoreCodex,spoilerState,providerState,themeProfile,allLocales}=data;
    let locale=data.locale, currentLanguage=languageProfile.ui_language;
    const app=document.getElementById('app'), reader=document.getElementById('reader'), content=document.getElementById('content'), nav=document.getElementById('nav');
    const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const t=k=>locale[k]||allLocales.en[k]||k;
    const entities=[...atlas.entities.characters,...atlas.entities.locations,...(atlas.entities.organizations||[]),...(atlas.entities.objects||[]),...(atlas.entities.concepts||[])];
    const byId=Object.fromEntries(entities.map(x=>[x.entity_id,x]));
    const assetsByEntity={}; manifest.assets.forEach(a=>(assetsByEntity[a.bound_to]??=[]).push(a));
    const sections=[['overview','overview'],['characters','characters'],['relationships','relationships'],['locations','locations'],['maps','maps'],['objects-lore','objects_lore'],['technologies-magic','technologies_magic'],['timeline','timeline'],['gallery','gallery'],['evidence','evidence'],['settings','settings']];
    document.documentElement.lang=currentLanguage; document.documentElement.dir=languageProfile.writing_direction;
    themeProfile.palette.forEach((color,index)=>document.documentElement.style.setProperty(['--bg','--text','--accent','--cyan','--red'][index],color));
    function imageFor(id,type){const items=assetsByEntity[id]||[];return (items.find(x=>!type||x.asset_id.includes(type))||items[0]||{}).file_path||''}
    function evidenceButton(item){const ev=item.evidence?.[0];return ev?`<button class="evidence-btn" data-paragraph="${esc(paragraphForChunk(ev.chunk_id))}">${esc(t('jump_to_text'))}</button>`:''}
    function paragraphForChunk(chunk){return readerText.paragraphs.find(p=>p.chunk_id===chunk)?.paragraph_id||readerText.paragraphs[0]?.paragraph_id||''}
    function card(item,kind='portrait'){return `<article class="card searchable" id="card-${esc(item.entity_id)}" data-entity-id="${esc(item.entity_id)}" data-search="${esc(JSON.stringify(item))}"><img class="art" src="${esc(imageFor(item.entity_id,kind))}" alt="${esc(item.canonical_name)}"><div class="card-body"><div class="kicker">${esc(item.entity_type)} · ${esc(item.category||item.role_name||item.location_type||'')}</div><h3>${esc(item.canonical_name)}</h3><p>${esc(item.memory_label||item.description||item.faction||item.spatial_notes||'')}</p><div class="tags">${(item.aliases||item.visual_keywords||[]).slice(0,4).map(x=>`<span class="tag">${esc(x)}</span>`).join('')}</div><p>${evidenceButton(item)}</p></div></article>`}
    function rowRelation(r){const locked=spoilerState.enabled&&r.spoiler_status==='locked';return `<article class="row searchable ${locked?'locked':''}" data-search="${esc(JSON.stringify(r))}"><div><strong>${esc(byId[r.source_entity_id]?.canonical_name||r.source_name)} → ${esc(byId[r.target_entity_id]?.canonical_name||r.target_name)}</strong><p>${locked?esc(t('locked_until_later')):esc(r.relation_type)}</p></div><div>${locked?'':esc(r.stage)}</div>${locked?'':evidenceButton(r)}</article>`}
    function renderNav(){nav.innerHTML=sections.map((s,i)=>`<button data-section="${s[0]}" class="${i===0?'active':''}">${esc(t(s[1]))}</button>`).join('')}
    function renderContent(){
      const visibleRelations=relationshipWeb.relationships.filter(r=>!(spoilerState.enabled&&r.spoiler_status==='locked'));
      const tech=objectLoreCodex.entries.filter(x=>/tech|magic|weapon|科技|魔法|武器/i.test(`${x.category} ${x.description}`));
      content.innerHTML=`
      <section class="section active" id="overview"><div class="eyebrow">${esc(themeProfile.theme_id)}</div><h1>${esc(atlas.metadata.title)}</h1><p class="lede">${esc(atlas.summary)}</p><div class="metrics"><div class="metric"><strong>${atlas.entities.characters.length}</strong><span>${esc(t('characters'))}</span></div><div class="metric"><strong>${visibleRelations.length}</strong><span>${esc(t('relationships'))}</span></div><div class="metric"><strong>${atlas.entities.locations.length}</strong><span>${esc(t('locations'))}</span></div><div class="metric"><strong>${objectLoreCodex.entries.length}</strong><span>${esc(t('objects_lore'))}</span></div></div><p class="muted">${esc(t('spoiler_safe_on'))} · ${esc(t('provider'))}: ${esc(providerState.selected_provider)} · ${esc(t('theme'))}: ${esc(themeProfile.theme_id)}</p></section>
      <section class="section" id="characters"><div class="section-head"><h2>${esc(t('characters'))}</h2><p class="muted">Character portraits, aliases, memory labels, and evidence-aware visual profiles.</p></div><div class="grid">${atlas.entities.characters.map(x=>card(x)).join('')||`<div class="empty">${esc(t('no_results'))}</div>`}</div></section>
      <section class="section" id="relationships"><div class="section-head"><h2>${esc(t('relationships'))}</h2><p class="muted">Global, character, faction, and timeline-ready relationship data.</p></div><div class="list">${relationshipWeb.relationships.map(rowRelation).join('')||`<div class="empty">${esc(t('no_results'))}</div>`}</div></section>
      <section class="section" id="locations"><div class="section-head"><h2>${esc(t('locations'))}</h2><p class="muted">Source-grounded places without invented precise geography.</p></div><div class="grid">${locationAtlas.locations.map(x=>card(x,'keyart')).join('')}</div></section>
      <section class="section" id="maps"><div class="section-head"><h2>${esc(t('maps'))}</h2><p class="muted">${esc(mapPlan.disclaimer)}</p></div><div class="map-canvas">${mapPlan.nodes.map(x=>`<button class="map-node" data-entity-id="${esc(x.location_id)}"><strong>${esc(x.label)}</strong><br><small>${esc(x.spatial_notes)}</small></button>`).join('')}</div></section>
      <section class="section" id="objects-lore"><div class="section-head"><h2>${esc(t('objects_lore'))}</h2><p class="muted">Weapons, potions, artifacts, concepts, and worldbuilding entries.</p></div><div class="grid">${objectLoreCodex.entries.map(x=>card(x,'codex')).join('')}</div></section>
      <section class="section" id="technologies-magic"><div class="section-head"><h2>${esc(t('technologies_magic'))}</h2></div><div class="grid">${tech.map(x=>card(x,'codex')).join('')||`<div class="empty">${esc(t('no_results'))}</div>`}</div></section>
      <section class="section" id="timeline"><div class="section-head"><h2>${esc(t('timeline'))}</h2></div><div class="list">${atlas.events.map(e=>{const locked=spoilerState.enabled&&e.spoiler_status==='locked';return `<article class="row ${locked?'locked':''}"><strong>${esc(e.title)}</strong><p>${locked?esc(t('locked_until_later')):esc(e.summary)}</p>${locked?'':evidenceButton(e)}</article>`}).join('')}</div></section>
      <section class="section" id="gallery"><div class="section-head"><h2>${esc(t('gallery'))}</h2></div><div class="gallery">${manifest.assets.map(a=>`<figure><img src="${esc(a.file_path)}" alt="${esc(a.alt_text)}"><figcaption>${esc(a.asset_id)} · ${esc(a.provider)}</figcaption></figure>`).join('')}</div></section>
      <section class="section" id="evidence"><div class="section-head"><h2>${esc(t('evidence'))}</h2><p class="muted">Confirmed, contextual, inferred, and unknown visual fields remain distinct.</p></div><div class="list">${data.visualEvidence.records.map(v=>`<article class="row"><strong>${esc(byId[v.entity_id]?.canonical_name)} · ${esc(v.field)}</strong><p>${esc(v.value)}</p><span class="tag">${esc(v.status)}</span></article>`).join('')}</div></section>
      <section class="section" id="settings"><div class="section-head"><h2>${esc(t('settings'))}</h2></div><div class="settings"><label class="setting"><span>${esc(t('language'))}</span><select id="languageSelect">${Object.keys(allLocales).map(x=>`<option value="${x}" ${x===currentLanguage?'selected':''}>${x} · ${allLocales[x]._status}</option>`).join('')}</select></label><label class="setting"><span>${esc(t('background'))}</span><input class="toggle" id="backgroundToggle" type="checkbox" ${themeProfile.background_enabled?'checked':''}></label><label class="setting"><span>${esc(t('font_size'))}</span><input id="fontSize" type="range" min="14" max="24" value="${localStorage.getItem('storyvista.readerFont')||17}"></label><label class="setting"><span>${esc(t('line_height'))}</span><input id="lineHeight" type="range" min="14" max="24" value="${localStorage.getItem('storyvista.readerLine')||18}"></label><div class="setting"><span>${esc(t('highlights'))}</span><div class="tags">${['character','location','object','lore','organization'].map(x=>`<label><input type="checkbox" class="highlightToggle" value="${x}" checked> ${x}</label>`).join(' ')}</div></div></div></section>`;
      bindSettings();
    }
    function linkedParagraphHtml(paragraph){
      const links=entityLinking.links.filter(x=>x.paragraph_id===paragraph.paragraph_id&&x.status==='resolved').sort((a,b)=>a.start-b.start);let cursor=0,html='';
      links.forEach(link=>{html+=esc(paragraph.text.slice(cursor,link.start));html+=`<span class="entity-highlight type-${esc(link.entity_type)}" data-entity-id="${esc(link.entity_id)}" title="${esc(byId[link.entity_id]?.memory_label||byId[link.entity_id]?.canonical_name)}">${esc(paragraph.text.slice(link.start,link.end))}</span>`;cursor=link.end});
      return html+esc(paragraph.text.slice(cursor));
    }
    function renderReader(){let chapter='';document.getElementById('readerBody').innerHTML=readerText.paragraphs.map(p=>{const head=p.chapter&&p.chapter!==chapter?(chapter=p.chapter,`<h3 class="reader-chapter">${esc(p.chapter)}</h3>`):'';return `${head}<p id="${esc(p.paragraph_id)}" data-progress="${esc(p.paragraph_id)}">${linkedParagraphHtml(p)}</p>`}).join('');document.getElementById('readerFoot').textContent=`${readerText.paragraphs.length} paragraphs · ${languageProfile.input_language}`}
    function openSection(id){document.querySelectorAll('.section').forEach(x=>x.classList.toggle('active',x.id===id));document.querySelectorAll('.nav button').forEach(x=>x.classList.toggle('active',x.dataset.section===id));window.scrollTo({top:0,behavior:'smooth'})}
    function sectionFor(entity){return entity.entity_type==='character'?'characters':entity.entity_type==='location'?'locations':entity.entity_type==='organization'?'overview':'objects-lore'}
    function openEntity(id){const entity=byId[id];if(!entity)return;openSection(sectionFor(entity));setTimeout(()=>{const card=document.getElementById(`card-${id}`);card?.scrollIntoView({behavior:'smooth',block:'center'});card?.classList.add('flash');setTimeout(()=>card?.classList.remove('flash'),1200)},60);showDetail(entity)}
    function showDetail(item){document.getElementById('detailBody').innerHTML=`<div class="eyebrow">${esc(item.entity_type||item.relation_id||item.event_id)}</div><h2>${esc(item.canonical_name||item.title||item.relation_type)}</h2><p class="muted">${esc(item.description||item.memory_label||item.summary||item.role_name||'')}</p>${item.visual_profile?Object.entries(item.visual_profile).map(([k,v])=>`<div class="evidence-block"><strong>${esc(k)}</strong><p>${esc(v.value)} · ${esc(v.status)}</p></div>`).join(''):''}${(item.evidence||[]).map(e=>`<div class="evidence-block"><span class="tag">${esc(e.status)}</span><blockquote>${esc(e.quote)}</blockquote><button class="evidence-btn" data-paragraph="${esc(paragraphForChunk(e.chunk_id))}">${esc(t('jump_to_text'))}</button></div>`).join('')}`;document.getElementById('detail').classList.add('open')}
    function jumpToParagraph(id){if(!id)return;openReader();setTimeout(()=>{const p=document.getElementById(id);p?.scrollIntoView({behavior:'smooth',block:'center'});p?.classList.add('flash');setTimeout(()=>p?.classList.remove('flash'),1400)},80)}
    function openReader(){app.classList.remove('reader-closed');reader.classList.add('mobile-open');document.getElementById('mobileReader').style.display='none';localStorage.setItem('storyvista.readerOpen','1')}
    function closeReader(){if(innerWidth<=1100){reader.classList.remove('mobile-open');document.getElementById('mobileReader').style.display='block'}else app.classList.add('reader-closed');localStorage.setItem('storyvista.readerOpen','0')}
    function bindSettings(){document.getElementById('languageSelect').onchange=e=>{currentLanguage=e.target.value;locale={...allLocales.en,...allLocales[currentLanguage]};renderNav();renderContent();document.getElementById('readerTitle').textContent=t('reader_panel');document.getElementById('search').placeholder=t('search')};document.getElementById('backgroundToggle').onchange=e=>document.body.classList.toggle('background-off',!e.target.checked);document.getElementById('fontSize').oninput=e=>{document.documentElement.style.setProperty('--reader-font',`${e.target.value}px`);localStorage.setItem('storyvista.readerFont',e.target.value)};document.getElementById('lineHeight').oninput=e=>{const v=e.target.value/10;document.documentElement.style.setProperty('--reader-line',v);localStorage.setItem('storyvista.readerLine',e.target.value)};document.querySelectorAll('.highlightToggle').forEach(box=>box.onchange=()=>document.querySelectorAll(`.entity-highlight.type-${box.value}`).forEach(x=>x.style.display=box.checked?'inline':'contents'))}
    renderNav();renderContent();renderReader();
    document.getElementById('readerTitle').textContent=t('reader_panel');document.getElementById('search').placeholder=t('search');document.getElementById('readerSearch').placeholder=t('search');document.getElementById('spoilerBadge').textContent=t('spoiler_safe_on');document.getElementById('sideStatus').textContent=`v0.3 · ${languageProfile.ui_language} · ${providerState.selected_provider}`;
    const savedWidth=Number(localStorage.getItem('storyvista.readerWidth')||390);document.documentElement.style.setProperty('--reader-width',`${Math.max(300,Math.min(620,savedWidth))}px`);document.documentElement.style.setProperty('--reader-font',`${localStorage.getItem('storyvista.readerFont')||17}px`);document.documentElement.style.setProperty('--reader-line',Number(localStorage.getItem('storyvista.readerLine')||18)/10);if(localStorage.getItem('storyvista.readerOpen')==='0')app.classList.add('reader-closed');
    nav.onclick=e=>{const b=e.target.closest('[data-section]');if(b)openSection(b.dataset.section)};
    document.addEventListener('click',e=>{const entity=e.target.closest('[data-entity-id]');if(entity)openEntity(entity.dataset.entityId);const evidence=e.target.closest('[data-paragraph]');if(evidence){e.stopPropagation();jumpToParagraph(evidence.dataset.paragraph)}});
    document.getElementById('detailClose').onclick=()=>document.getElementById('detail').classList.remove('open');document.getElementById('readerClose').onclick=closeReader;document.getElementById('railOpen').onclick=openReader;document.getElementById('mobileReader').onclick=openReader;
    document.getElementById('search').oninput=e=>{const q=e.target.value.toLowerCase();document.querySelectorAll('.searchable').forEach(x=>x.hidden=q&&!x.dataset.search.toLowerCase().includes(q))};document.getElementById('readerSearchButton').onclick=()=>{const q=document.getElementById('readerSearch').value.toLowerCase();const p=[...document.querySelectorAll('#readerBody p')].find(x=>x.textContent.toLowerCase().includes(q));p&&jumpToParagraph(p.id)};
    let drag=false;document.getElementById('readerHandle').onmousedown=()=>drag=true;window.onmouseup=()=>drag=false;window.onmousemove=e=>{if(!drag)return;const width=Math.max(300,Math.min(620,innerWidth-e.clientX));document.documentElement.style.setProperty('--reader-width',`${width}px`);localStorage.setItem('storyvista.readerWidth',width)};
    document.getElementById('readerBody').onscroll=e=>{const paragraphs=[...e.currentTarget.querySelectorAll('p')];const current=paragraphs.find(p=>p.getBoundingClientRect().top>80)||paragraphs.at(-1);if(current)localStorage.setItem('storyvista.readerProgress',current.id)};const progress=localStorage.getItem('storyvista.readerProgress');if(progress)setTimeout(()=>document.getElementById(progress)?.scrollIntoView(),100);
  })();
  </script>
</body>
